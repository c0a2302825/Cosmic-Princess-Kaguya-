<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %} - 超かぐや姫！グッズ管理</title>
    <!-- Tailwind CSSとFont Awesomeの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* かわいい雰囲気のフォントを適用 */
      @import url("https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap");
      body {
        font-family: "M PLUS Rounded 1c", sans-serif;
        background-color: #fff5f7;
      }
      /* かぐや姫をイメージしたピンクのグラデーション */
      .pink-gradient {
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 99%,
          #fecfef 100%
        );
      }
      .card-hover:hover {
        transform: translateY(-5px);
        transition: transform 0.3s ease;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- ナビゲーションバー -->
    <nav class="pink-gradient text-white shadow-lg p-4 mb-6">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <a href="/" class="text-2xl font-bold flex items-center gap-2">
          <i class="fas fa-moon"></i>
          <span class="tracking-wider text-white drop-shadow-sm"
            >超かぐや姫！グッズ管理</span
          >
        </a>
        <div class="flex gap-4">
          <a href="/" class="hover:text-pink-100 transition font-bold">一覧</a>
          <a
            href="/add"
            class="bg-white text-pink-500 px-4 py-1 rounded-full font-bold hover:bg-pink-50 transition shadow-sm"
          >
            <i class="fas fa-plus mr-1"></i> 追加
          </a>
        </div>
      </div>
    </nav>

    <!-- メインコンテンツエリア -->
    <main class="max-w-4xl mx-auto p-4 flex-grow w-full">
      <!-- フラッシュメッセージ -->
      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div
        class="bg-white border-l-4 border-pink-400 text-pink-700 p-4 mb-6 rounded-r-xl shadow-sm flex items-center animate-bounce"
      >
        <i class="fas fa-star mr-3 text-pink-300"></i>
        {{ message }}
      </div>
      {% endfor %} {% endif %} {% endwith %}

      <!-- 各ページの中身がここに挿入されます -->
      {% block content %}{% endblock %}
    </main>

    <!-- フッター -->
    <footer class="text-center py-8 text-pink-300 text-sm">
      <div class="mb-2">
        <i class="fas fa-stars"></i> Cosmic Princess Kaguya Merch Manager
        <i class="fas fa-stars"></i>
      </div>
      <p>&copy; 2026 超かぐや姫！制作委員会（仮）</p>
    </footer>
  </body>
</html>
