{% extends "layout.html" %} {% block title %}グッズ編集{% endblock %} {% block
content %}
<div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl mx-auto">
  <div class="mb-8">
    <h1
      class="text-3xl font-bold text-pink-600 flex items-center gap-3 justify-center"
    >
      <i class="fas fa-edit"></i>
      グッズを編集
    </h1>
    <p class="text-gray-600 text-center mt-2">
      「{{ goods.name }}」の情報を更新します
    </p>
  </div>

  <form method="POST" class="space-y-6">
    <div>
      <label for="name" class="block text-sm font-bold text-pink-700 mb-2">
        <i class="fas fa-tag mr-1"></i>商品名
      </label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ goods.name }}"
        required
        class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors"
      />
    </div>

    <div>
      <label for="category" class="block text-sm font-bold text-pink-700 mb-2">
        <i class="fas fa-folder mr-1"></i>カテゴリ
      </label>
      <select
        id="category"
        name="category"
        required
        class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors bg-white"
      >
        <option
          value="フィギュア"
          {%
          if
          goods.category=""
          ="フィギュア"
          %}selected{%
          endif
          %}
        >
          🎎 フィギュア
        </option>
        <option
          value="ポスター"
          {%
          if
          goods.category=""
          ="ポスター"
          %}selected{%
          endif
          %}
        >
          🖼️ ポスター
        </option>
        <option
          value="Tシャツ"
          {%
          if
          goods.category=""
          ="Tシャツ"
          %}selected{%
          endif
          %}
        >
          👕 Tシャツ
        </option>
        <option
          value="アクセサリー"
          {%
          if
          goods.category=""
          ="アクセサリー"
          %}selected{%
          endif
          %}
        >
          💍 アクセサリー
        </option>
        <option
          value="その他"
          {%
          if
          goods.category=""
          ="その他"
          %}selected{%
          endif
          %}
        >
          📦 その他
        </option>
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label for="price" class="block text-sm font-bold text-pink-700 mb-2">
          <i class="fas fa-yen-sign mr-1"></i>価格 (円)
        </label>
        <input
          type="number"
          id="price"
          name="price"
          step="0.01"
          value="{{ goods.price }}"
          required
          class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors"
        />
      </div>

      <div>
        <label for="stock" class="block text-sm font-bold text-pink-700 mb-2">
          <i class="fas fa-boxes mr-1"></i>在庫数
        </label>
        <input
          type="number"
          id="stock"
          name="stock"
          value="{{ goods.stock }}"
          required
          class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors"
        />
      </div>
    </div>

    <div>
      <label
        for="description"
        class="block text-sm font-bold text-pink-700 mb-2"
      >
        <i class="fas fa-align-left mr-1"></i>説明
      </label>
      <textarea
        id="description"
        name="description"
        rows="4"
        class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors resize-vertical"
      >
{{ goods.description or '' }}</textarea
      >
    </div>

    <div>
      <label for="image_url" class="block text-sm font-bold text-pink-700 mb-2">
        <i class="fas fa-image mr-1"></i>画像URL (オプション)
      </label>
      <input
        type="url"
        id="image_url"
        name="image_url"
        value="{{ goods.image_url or '' }}"
        class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors"
      />
      <p class="text-xs text-gray-500 mt-1">
        商品の画像がある場合はURLを入力してください
      </p>
    </div>

    <div class="flex gap-4 justify-center pt-6">
      <button
        type="submit"
        class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-full font-bold transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center gap-2"
      >
        <i class="fas fa-save"></i>
        更新する
      </button>
      <a
        href="{{ url_for('index') }}"
        class="bg-gray-500 hover:bg-gray-600 text-white px-8 py-3 rounded-full font-bold transition-all duration-300 transform hover:scale-105 shadow-lg flex items-center gap-2"
      >
        <i class="fas fa-times"></i>
        キャンセル
      </a>
    </div>
  </form>
</div>
{% endblock %}
