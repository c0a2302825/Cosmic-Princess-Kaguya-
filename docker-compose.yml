version: "3.8"

services:
  # Flaskバックエンド
  app:
    build: .
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      # Dockerネットワーク内のDBホスト名 'db' を指定
      - DB_URL=mysql+pymysql://root:kaguya_pass@db:3306/kaguya_db
    depends_on:
      db:
        condition: service_healthy

  # MySQLデータベース
  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=kaguya_pass
      - MYSQL_DATABASE=kaguya_db
    volumes:
      - kaguya_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  kaguya_data: